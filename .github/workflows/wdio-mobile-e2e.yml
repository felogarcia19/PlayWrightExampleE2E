name: WebdriverIO + Appium Mobile E2E Tests

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  wdio-e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "emulator" "platforms;android-34" "system-images;android-34;google_apis;x86_64"

      - name: Create Android Virtual Device
        run: |
          echo "no" | avdmanager create avd -n Prelude_Pixel_7 -k "system-images;android-34;google_apis;x86_64" -d pixel_7 || true

      - name: Validate Appium setup
        run: npm run appium:driver:doctor

      - name: Start emulator and run WebdriverIO tests
        run: |
          emulator -avd Prelude_Pixel_7 -no-snapshot-save -no-boot-anim &
          sleep 20
          npm run wdio:test || RESULT=$?
          kill %1 || true
          exit ${RESULT:-0}
        timeout-minutes: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: wdio-results-${{ matrix.node-version }}
          path: |
            wdio/
            test-results/
          retention-days: 7

      - name: Report test status
        if: failure()
        run: echo "WebdriverIO tests failed. See artifacts for details."
